<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Has Lakshay Troubled You? 😤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== PAGE 1: QUESTION ===== -->
  <div id="page-question" class="page active">
    <div class="stars-bg"></div>
    <div class="question-card">
      <div class="emoji-big">😤</div>
      <h1 class="question-title">Has <span class="name-hl">Lakshay</span> troubled you?</h1>
      <p class="question-sub">Think carefully. This is important.</p>
      <div class="btn-group">
        <button id="btn-yes" class="btn btn-yes" onclick="goToPunchPage()">
          <span>👊</span> YES
        </button>
        <button id="btn-no" class="btn btn-no" onclick="handleNo(this)">
          <span>🙅</span> NO
        </button>
      </div>
      <p id="no-msg" class="no-msg hidden"></p>
    </div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <!-- ===== PAGE 2: PUNCH PAGE ===== -->
  <div id="page-punch" class="page">

    <div class="punch-header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h1 class="punch-title">👊 BEAT HIM UP!</h1>
      <button class="reset-btn" onclick="resetPunches()">Reset 🔄</button>
    </div>

    <!-- Damage bar -->
    <div class="dmg-wrap">
      <div class="dmg-labels">
        <span>Damage</span>
        <span id="dmg-pct">0%</span>
      </div>
      <div class="dmg-bar-bg">
        <div id="dmg-bar" class="dmg-bar-fill"></div>
      </div>
      <div class="dmg-level-label" id="dmg-level-label">😊 Untouched</div>
    </div>

    <!-- Photo -->
    <div class="photo-area" id="photo-area" onclick="punch()">
      <div class="photo-wrapper">
        <img id="victim-img" src="DSC_0027.JPG" alt="Lakshay" draggable="false" />
        <!-- Damage overlays — CSS classes added progressively -->
        <div id="overlay-bruise"   class="dmg-overlay overlay-bruise   hidden"></div>
        <div id="overlay-blood"    class="dmg-overlay overlay-blood    hidden"></div>
        <div id="overlay-bandage"  class="dmg-overlay overlay-bandage  hidden"></div>
        <div id="overlay-ko"       class="dmg-overlay overlay-ko       hidden"></div>
        <div id="overlay-rip"      class="dmg-overlay overlay-rip      hidden"></div>
        <!-- Punch flash -->
        <div id="punch-flash" class="punch-flash hidden">💥</div>
      </div>
      <div class="tap-hint" id="tap-hint">👆 TAP TO PUNCH!</div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="punch-count">0</div>
        <div class="stat-lbl">Punches</div>
      </div>
      <div class="stat-card stat-combo">
        <div class="stat-num" id="combo-count">x0</div>
        <div class="stat-lbl">Combo 🔥</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="dmg-num">0</div>
        <div class="stat-lbl">Damage %</div>
      </div>
    </div>

    <!-- Combo message popup -->
    <div id="combo-popup" class="combo-popup hidden"></div>

    <div class="blob b1 dark"></div>
    <div class="blob b2 dark"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
